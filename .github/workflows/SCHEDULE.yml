name: "[bot] Daily profile sync"

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch: # Allow manual trigger

jobs:
  sync-readme:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.KEY }}

      - name: Update sync timestamp
        run: |
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          sed -i "s/<!-- last-sync: .* -->/<!-- last-sync: $TIMESTAMP -->/" README.md

      - name: Commit and push
        run: |
          git config --global user.name "kevnnard-bot"
          git config --global user.email "londonokevin9@gmail.com"
          git add README.md
          git diff --staged --quiet || git commit -m "[bot] Sync profile - $(date -u +%Y-%m-%d)"
          git push
